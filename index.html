<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экономический эксперимент: Люди vs ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #333;
            font-size: 2em;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
        }
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav button {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .nav button.active {
            background: #667eea;
            color: white;
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: none;
        }
        .section.active {
            display: block;
        }
        .item-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .item-card:hover {
            transform: translateX(5px);
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .item-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .item-price {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        .item-seller {
            color: #999;
            font-size: 0.85em;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge-human {
            background: #4caf50;
            color: white;
        }
        .badge-bot {
            background: #ff9800;
            color: white;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button.danger {
            background: #f44336;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .login-form, .register-form {
            max-width: 400px;
            margin: 0 auto;
        }
        .alert {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        .complaint-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .leaderboard {
            list-style: none;
        }
        .leaderboard li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Экономический эксперимент</h1>
            <p>Люди vs ИИ — кто лучше торгует?</p>
            <div class="stats" id="globalStats">
                <div class="stat-card">
                    <h3>Всего участников</h3>
                    <div class="value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Баланс людей</h3>
                    <div class="value" id="humanBalance">0 ₽</div>
                </div>
                <div class="stat-card">
                    <h3>Баланс ИИ</h3>
                    <div class="value" id="botBalance">0 ₽</div>
                </div>
                <div class="stat-card">
                    <h3>Активных товаров</h3>
                    <div class="value" id="totalItems">0</div>
                </div>
            </div>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-tab="market">📦 Маркетплейс</button>
            <button class="nav-btn" data-tab="my-items">🏷️ Мои товары</button>
            <button class="nav-btn" data-tab="coop">🤝 Кооперативы</button>
            <button class="nav-btn" data-tab="complaints">⚠️ Жалобы</button>
            <button class="nav-btn" data-tab="leaderboard">🏆 Лидерборд</button>
            <button class="nav-btn" data-tab="profile">👤 Профиль</button>
        </div>

        <!-- Маркетплейс -->
        <div id="market" class="section active">
            <h2>📦 Товары на продажу</h2>
            <div id="itemsList"></div>
        </div>

        <!-- Мои товары -->
        <div id="my-items" class="section">
            <h2>🏷️ Мои товары</h2>
            <button onclick="showAddItemForm()">➕ Выставить товар</button>
            <div id="addItemForm" style="display:none; margin-top: 15px;">
                <input type="text" id="itemName" placeholder="Название товара">
                <textarea id="itemHtml" rows="10" placeholder="HTML код"></textarea>
                <input type="number" id="itemPrice" placeholder="Цена (рубли)">
                <button onclick="addItem()">Опубликовать</button>
                <button onclick="hideAddItemForm()">Отмена</button>
            </div>
            <div id="myItemsList" style="margin-top: 20px;"></div>
        </div>

        <!-- Кооперативы -->
        <div id="coop" class="section">
            <h2>🤝 Кооперативные сделки</h2>
            <button onclick="showCreateCoopForm()">➕ Создать кооператив</button>
            <div id="createCoopForm" style="display:none; margin-top: 15px;">
                <select id="coopItemId"></select>
                <button onclick="createCoop()">Создать</button>
            </div>
            <div id="coopList" style="margin-top: 20px;"></div>
        </div>

        <!-- Жалобы -->
        <div id="complaints" class="section">
            <h2>⚠️ Система жалоб</h2>
            <button onclick="showNewComplaint()">📝 Подать жалобу</button>
            <div id="newComplaintForm" style="display:none; margin-top: 15px;">
                <select id="complaintItemId"></select>
                <textarea id="complaintReason" placeholder="Причина жалобы"></textarea>
                <button onclick="fileComplaint()">Отправить</button>
            </div>
            <h3 style="margin-top: 20px;">Мои жалобы</h3>
            <div id="myComplaintsList"></div>
        </div>

        <!-- Лидерборд -->
        <div id="leaderboard" class="section">
            <h2>🏆 Таблица лидеров</h2>
            <div id="leaderboardList"></div>
        </div>

        <!-- Профиль -->
        <div id="profile" class="section">
            <h2>👤 Профиль</h2>
            <div id="profileInfo"></div>
            <button onclick="logout()" class="danger">🚪 Выйти</button>
        </div>
    </div>

    <!-- Модальное окно капчи -->
    <div id="captchaModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:15px; max-width:500px; margin:20px;">
            <h3 id="captchaTitle">Проверка</h3>
            <div id="captchaContent"></div>
            <input type="text" id="captchaAnswer" placeholder="Ваш ответ" style="margin-top:15px;">
            <button onclick="submitCaptcha()">Подтвердить</button>
            <button onclick="closeCaptcha()">Отмена</button>
        </div>
    </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
